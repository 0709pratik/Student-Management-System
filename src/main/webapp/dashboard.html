<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  display: flex;
  margin: 0;
  background: #f8f9fa;
  font-family: Arial;
}

.sidebar {
  width: 230px;
  height: 100vh;
  background: #212529;
  color: white;
  padding: 20px;
}

.sidebar a {
  color: white;
  display: block;
  margin: 15px 0;
  text-decoration: none;
}

.sidebar a:hover {
  color: #0d6efd;
}

.main {
  flex: 1;
  padding: 20px;
}

.card {
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}
</style>

</head>

<body>

<div class="sidebar">
  <h3>Admin Panel</h3>
  <hr>
  <a href="dashboard.html">Dashboard</a>
  <a href="students.html">Students</a>
  <a href="teacher.html">Teacher Panel</a>
</div>

<div class="main">

  <!-- 🔥 Logout Button -->
  <div class="d-flex justify-content-end mb-3">
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>

  <h1>Dashboard</h1>

  <div class="row g-4">

    <div class="col-md-4">
      <div class="card text-white bg-primary">
        <div class="card-body text-center">
          <h5>Total Students</h5>
          <h2 id="count">0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-white bg-success">
        <div class="card-body text-center">
          <h5>Placement</h5>
          <h2 id="placementCount">0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-white bg-warning">
        <div class="card-body text-center">
          <h5>GATE</h5>
          <h2 id="gateCount">0</h2>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
function loadDashboard() {
  fetch("http://localhost:8080/Student_Management_System/getStudents")
    .then(res => res.json())
    .then(data => {
      document.getElementById("count").innerText = data.length;
      document.getElementById("placementCount").innerText =
        data.filter(s => s.track === "Placement").length;
      document.getElementById("gateCount").innerText =
        data.filter(s => s.track === "GATE").length;
    });
}

function logout() {
  window.location.href = "http://localhost:8080/Student_Management_System/logout";
}

window.onload = loadDashboard;
</script>

</body>
</html>
