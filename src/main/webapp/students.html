<!DOCTYPE html>
<html>
<head>
<title>Students</title>

<!-- 🔥 Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  display: flex;
  font-family: Arial;

  /* 🔥 WHITE BACKGROUND */
  background: #f8f9fa;
}

/* Sidebar */
.sidebar {
  width: 230px;
  height: 100vh;
  background: #212529;
  color: white;
  padding: 20px;
}

.sidebar a {
  color: white;
  display: block;
  margin: 15px 0;
  text-decoration: none;
}

.sidebar a:hover {
  color: #0d6efd;
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

/* Table Styling */
.table-container {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

thead {
  background: #212529;
  color: white;
}

tr:hover {
  background: #f1f1f1;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h3>Admin Panel</h3>
  <hr>
  <a href="dashboard.html">Dashboard</a>
  <a href="students.html">Students</a>
  <a href="teacher.html">Teacher Panel</a>
</div>

<!-- Main -->
<div class="main">

  <!-- Logout -->
  <div class="d-flex justify-content-end mb-3">
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>

  <h1 class="mb-4">Students</h1>

  <button class="btn btn-primary mb-3" onclick="goToAdd()">Add Student</button>

  <div class="table-container">
    <table class="table table-bordered text-center">
      <thead>
        <tr>
          <th>Name</th>
          <th>Roll</th>
          <th>Email</th>
          <th>Course</th>
          <th>Percentage</th>
          <th>Track</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script>

function loadStudents() {
  fetch("http://localhost:8080/Student_Management_System/getStudents")
    .then(res => res.json())
    .then(data => {

      let table = "";

      data.forEach(s => {
        table += `
          <tr>
            <td>${s.name}</td>
            <td>${s.roll}</td>
            <td>${s.email}</td>
            <td>${s.course}</td>
            <td>${s.percentage}</td>
            <td>${s.track}</td>
          </tr>
        `;
      });

      document.getElementById("tableBody").innerHTML = table;
    });
}

function goToAdd() {
  window.location.href = "add_student.html";
}

function logout() {
  window.location.href = "http://localhost:8080/Student_Management_System/logout";
}

window.onload = loadStudents;

</script>

</body>
</html>
