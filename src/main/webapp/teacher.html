<!DOCTYPE html>
<html>
<head>
<title>Teacher Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  display: flex;
  font-family: Arial;
}

.sidebar {
  width: 230px;
  height: 100vh;
  background: #212529;
  color: white;
  padding: 20px;
}

.sidebar a {
  color: white;
  display: block;
  margin: 15px 0;
  text-decoration: none;
}

.sidebar a:hover {
  color: #0d6efd;
}

.main {
  flex: 1;
  padding: 20px;
}
</style>

</head>

<body>

<div class="sidebar">
  <h3>Admin Panel</h3>
  <hr>
  <a href="dashboard.html">Dashboard</a>
  <a href="students.html">Students</a>
  <a href="teacher.html">Teacher Panel</a>
</div>

<div class="main">

  <!-- 🔥 Logout -->
  <div class="d-flex justify-content-end mb-3">
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>

  <h1>Teacher Panel</h1>

  <input type="text" id="teacherName" class="form-control mb-3" placeholder="Teacher Name">

  <div class="d-flex gap-2 mb-3">
    <select id="filterTrack" class="form-select">
      <option value="">All</option>
      <option value="Placement">Placement</option>
      <option value="GATE">GATE</option>
    </select>

    <button class="btn btn-primary" onclick="loadStudents()">Filter</button>
    <button class="btn btn-success" onclick="assignStudents()">Assign</button>
  </div>

  <table class="table table-bordered text-center">
    <thead>
      <tr>
        <th>Select</th>
        <th>Name</th>
        <th>Roll</th>
        <th>Email</th>
        <th>Course</th>
        <th>Track</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>
function loadStudents() {
  fetch("http://localhost:8080/Student_Management_System/getStudents")
    .then(res => res.json())
    .then(data => {
      let filter = document.getElementById("filterTrack").value;
      let filtered = filter ? data.filter(s => s.track === filter) : data;

      let table = "";
      filtered.forEach(s => {
        table += `
          <tr>
            <td><input type="checkbox" value="${s.roll}"></td>
            <td>${s.name}</td>
            <td>${s.roll}</td>
            <td>${s.email}</td>
            <td>${s.course}</td>
            <td>${s.track}</td>
          </tr>
        `;
      });

      document.getElementById("tableBody").innerHTML = table;
    });
}

function assignStudents() {
  let teacher = document.getElementById("teacherName").value;
  if (!teacher) return alert("Enter teacher name");

  let selected = [];
  document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(cb => selected.push(cb.value));

  if (selected.length === 0) return alert("Select students");

  fetch("http://localhost:8080/Student_Management_System/assignStudents", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: "teacher=" + teacher + "&" + selected.map(s => "students=" + s).join("&")
  })
  .then(res => res.text())
  .then(msg => alert(msg));
}

function logout() {
  window.location.href = "http://localhost:8080/Student_Management_System/logout";
}

window.onload = loadStudents;
</script>

</body>
</html>
